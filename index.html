<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eid Greeting PRO MAX</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  background:#001f1f;
  color:white;
  text-align:center;
  font-family:Segoe UI;
}

.controls{
  margin:10px;
}

input, button{
  padding:10px;
  margin:5px;
}

.card{
  position:relative;
  width:320px;
  height:560px;
  margin:20px auto;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* DRAGGABLE ITEMS */
.logo, .name{
  position:absolute;
  cursor:grab;
  user-select:none;
}

.logo{
  width:65px;
}

.name{
  color:#FFD700;
  font-weight:bold;
  text-shadow:2px 2px 6px black;
  font-size:24px;
  max-width:80%;
  text-align:center;
}

.website{
  position:absolute;
  bottom:10px;
  right:12px;
  font-size:11px;
  color:yellow;
}
</style>
</head>

<body>

<h2>🌙 Eid Greeting PRO MAX</h2>

<div class="controls">
<input id="name" placeholder="Apna naam likhein">
<button onclick="generate()">Generate</button>
<button onclick="downloadCard()">Download PNG</button>
</div>

<div id="output"></div>

<script>

let activeDrag = null;
let offsetX = 0;
let offsetY = 0;

/* 🧠 NAME FORMAT */
function formatName(name){
  let words = name.trim().split(" ");
  return words.join("<br>");
}

/* 📏 FONT SIZE AUTO */
function getFontSize(name){
  if(name.length < 10) return 28;
  if(name.length < 20) return 24;
  if(name.length < 30) return 20;
  return 18;
}

/* 🚀 GENERATE */
function generate(){

  let name = document.getElementById("name").value.trim();
  if(!name) return alert("Naam likhein");

  let html = "";

  let designs = ["blue.jpg","green.jpg","black.jpg","mosque.jpg"];

  designs.forEach(bg => {

    html += `
    <div class="card" style="background-image:url('${bg}')">

      <img src="logo.png" class="logo drag" style="left:15px;bottom:15px;" onmousedown="startDrag(event)">
      
      <div class="name drag"
        style="left:50%; top:60%; transform:translateX(-50%); font-size:${getFontSize(name)}px;"
        onmousedown="startDrag(event)">
        ${formatName(name)}
      </div>

      <div class="website">www.raashidiyah.com</div>

    </div>`;
  });

  document.getElementById("output").innerHTML = html;
}

/* 🖱️ DRAG SYSTEM */
function startDrag(e){
  activeDrag = e.target;
  offsetX = e.offsetX;
  offsetY = e.offsetY;
  document.onmousemove = drag;
  document.onmouseup = stopDrag;
}

function drag(e){
  if(!activeDrag) return;

  let parent = activeDrag.parentElement;
  let rect = parent.getBoundingClientRect();

  let x = e.clientX - rect.left - offsetX;
  let y = e.clientY - rect.top - offsetY;

  activeDrag.style.left = x + "px";
  activeDrag.style.top = y + "px";
  activeDrag.style.transform = "none";
}

function stopDrag(){
  activeDrag = null;
  document.onmousemove = null;
}

/* 📸 DOWNLOAD PNG */
function downloadCard(){
  let card = document.querySelector(".card");

  html2canvas(card, {scale:2}).then(canvas => {
    let link = document.createElement("a");
    link.download = "eid-card.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

</script>

</body>
</html>
