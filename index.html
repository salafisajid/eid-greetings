<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eid Generator PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0c1a1a;
  color:white;
  text-align:center;
}

/* 🔥 BIG FIRST SCREEN */
.header{
  padding:40px 20px;
}

h1{
  font-size:34px;
  margin-bottom:10px;
}

input{
  width:80%;
  max-width:400px;
  padding:18px;
  font-size:20px;
  border-radius:12px;
  border:none;
  text-align:center;
}

.generate{
  margin-top:15px;
  padding:14px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:gold;
  cursor:pointer;
  font-weight:bold;
}

/* CARDS */
.card{
  width:320px;
  height:560px;
  margin:20px auto;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
}

/* DARK OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

/* NAME BOTTOM CENTER */
.name{
  position:absolute;
  bottom:35px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:bold;
  color:#FFD700;
  text-shadow:2px 2px 6px black;
}

/* LOGO BOTTOM LEFT */
.logo{
  position:absolute;
  bottom:15px;
  left:15px;
  width:60px;
}

/* BUTTONS */
.actions{
  margin-top:5px;
}

button{
  padding:10px 16px;
  margin:5px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.download{
  background:green;
  color:white;
}

.share{
  background:#25D366;
  color:white;
}
</style>
</head>

<body>

<!-- 🔥 BIG FIRST SCREEN -->
<div class="header">
  <h1>🌙 Eid Generator</h1>
  <p>Apna naam likhein</p>

  <input id="name" placeholder="Enter your name">

  <br>
  <button class="generate" onclick="generate()">Generate Cards</button>
</div>

<!-- OUTPUT -->
<div id="output"></div>

<script>

function generate(){

  let name=document.getElementById("name").value.trim();
  if(!name) return alert("Naam likhein");

  let designs=[
    "eid.jpg",
    "eid2.jpg",
    "pink.jpg"
  ];

  let html="";

  designs.forEach((bg,i)=>{

    html+=`
    <div>

      <div class="card" id="card${i}" style="background-image:url('${bg}')">

        <div class="overlay">

          <img src="logo.png" class="logo">

          <div class="name">${name}</div>

        </div>

      </div>

      <div class="actions">

        <button class="download" onclick="downloadCard('card${i}')">
          Download
        </button>

        <button class="share" onclick="shareImage('card${i}')">
          Share
        </button>

      </div>

    </div>
    `;

  });

  document.getElementById("output").innerHTML=html;
}

/* DOWNLOAD */
function downloadCard(id){
  html2canvas(document.getElementById(id)).then(canvas=>{
    let a=document.createElement("a");
    a.download="eid-card.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
  });
}

/* SHARE (mobile share sheet) */
async function shareImage(id){

  let card=document.getElementById(id);

  let canvas=await html2canvas(card);

  canvas.toBlob(async (blob)=>{

    let file=new File([blob],"eid.png",{type:"image/png"});

    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){

      await navigator.share({
        title:"Eid Mubarak",
        text:"🌙 Eid Mubarak",
        files:[file]
      });

    }else{

      let a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download="eid.png";
      a.click();

      alert("Share not supported, image downloaded");
    }

  });

}

</script>

</body>
</html>
