<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eid Generator PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0c1a1a;
  color:white;
  text-align:center;
}

/* HOME SCREEN */
.header{
  padding:50px 20px;
}

h1{
  font-size:34px;
  margin-bottom:10px;
}

input{
  width:85%;
  max-width:420px;
  padding:18px;
  font-size:20px;
  border-radius:12px;
  border:none;
  text-align:center;
}

.generate{
  margin-top:15px;
  padding:14px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:gold;
  cursor:pointer;
  font-weight:bold;
}

/* CARD */
.card{
  width:320px;
  height:560px;
  margin:20px auto;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

/* NAME */
.name{
  position:absolute;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:bold;
  color:#FFD700;
  text-shadow:2px 2px 6px black;
  text-align:center;
  width:90%;
}

/* ARABIC (AMIRI) */
.arabic{
  font-family:'Amiri', serif; /* ✅ TRADITIONAL ARABIC */
  direction:rtl;
  font-size:30px;
}

/* URDU */
.urdu{
  font-family:'Noto Nastaliq Urdu', serif;
  direction:rtl;
  font-size:28px;
}

/* LOGO */
.logo{
  position:absolute;
  bottom:15px;
  left:15px;
  width:60px;
}

/* BUTTONS */
.actions{
  margin-top:5px;
}

button{
  padding:10px 16px;
  margin:5px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.download{
  background:green;
  color:white;
}

.share{
  background:#25D366;
  color:white;
}
</style>
</head>

<body>

<!-- HOME SCREEN -->
<div class="header">
  <h1>🌙 Eid Generator PRO</h1>
  <p>Apna naam likhein</p>

  <input id="name" placeholder="Enter your name">

  <br>
  <button class="generate" onclick="generate()">Generate Cards</button>
</div>

<!-- OUTPUT -->
<div id="output"></div>

<script>

/* DETECTION */
function isArabic(text){
  return /[\u0600-\u06FF]/.test(text);
}

function isUrdu(text){
  return /[\u0600-\u06FF\u0750-\u077F]/.test(text);
}

/* GENERATE */
function generate(){

  let name=document.getElementById("name").value.trim();
  if(!name) return alert("Naam likhein");

  let designs=[
    "eid.jpg",
    "eid2.jpg",
    "pink.jpg"
  ];

  let html="";

  designs.forEach((bg,i)=>{

    let fontClass="name";

    /* 🔥 PRIORITY FIX */
    if(isArabic(name)){
      fontClass="name arabic";
    }
    else if(isUrdu(name)){
      fontClass="name urdu";
    }

    html+=`
    <div>

      <div class="card" id="card${i}" style="background-image:url('${bg}')">

        <div class="overlay">

          <img src="logo.png" class="logo">

          <div class="${fontClass}">${name}</div>

        </div>

      </div>

      <div class="actions">

        <button class="download" onclick="downloadCard('card${i}')">
          Download
        </button>

        <button class="share" onclick="shareImage('card${i}')">
          Share
        </button>

      </div>

    </div>
    `;
  });

  document.getElementById("output").innerHTML=html;
}

/* DOWNLOAD */
function downloadCard(id){
  html2canvas(document.getElementById(id)).then(canvas=>{
    let a=document.createElement("a");
    a.download="eid-card.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
  });
}

/* SHARE SHEET */
async function shareImage(id){

  let card=document.getElementById(id);

  let canvas=await html2canvas(card);

  canvas.toBlob(async (blob)=>{

    let file=new File([blob],"eid-card.png",{type:"image/png"});

    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){

      try{
        await navigator.share({
          title:"Eid Mubarak",
          text:"🌙 Eid Mubarak",
          files:[file]
        });
      }catch(e){
        console.log("Share cancelled");
      }

    }else{

      let a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download="eid-card.png";
      a.click();

      alert("Device share supported nahi hai");
    }

  });

}

</script>

</body>
</html>
