<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eid Generator PRO HD</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0c1a1a;
  color:white;
  text-align:center;
}

/* HOME */
.header{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

h1{
  font-size:80px;
  margin:0;
}

input{
  width:90%;
  max-width:600px;
  padding:26px;
  font-size:28px;
  border:none;
  border-radius:12px;
  text-align:center;
  margin-top:20px;
}

.generate{
  margin-top:20px;
  padding:18px 50px;
  font-size:24px;
  background:gold;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.info{
  margin-top:25px;
  font-size:22px;
  color:#FFD700;
  line-height:1.8;
}

/* CARD */
.card{
  width:320px;
  height:560px;
  margin:20px auto;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

.name{
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
  font-weight:bold;
  color:#FFD700;
  width:90%;
}

.arabic{
  font-family:'Amiri', serif;
  direction:rtl;
  font-size:32px;
}

.urdu{
  font-family:'Noto Nastaliq Urdu', serif;
  direction:rtl;
  font-size:30px;
}

.logo{
  position:absolute;
  bottom:15px;
  left:15px;
  width:60px;
}

.actions button{
  padding:10px 16px;
  margin:5px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.download{background:green;color:white;}
.share{background:#25D366;color:white;}
</style>
</head>

<body>

<!-- HOME PAGE -->
<div class="header" id="home">

  <h1>🌙 Eid Mubarak</h1>

  <p style="font-size:24px;font-weight:600;">
    KULLIYATUR RASHIDAATIL ISLAMIYAH
  </p>

  <input id="name" placeholder="Apna naam likhein">

  <button class="generate" onclick="openCards()">Generate Cards</button>

  <div class="info">
    📞 +91 87791 22931<br>
    🌐 www.raashidiyah.com
  </div>

</div>

<!-- CARDS PAGE -->
<div id="cardsPage" style="display:none;"></div>

<script>

function isArabic(text){
  return /[\u0600-\u06FF]/.test(text);
}
function isUrdu(text){
  return /[\u0600-\u06FF\u0750-\u077F]/.test(text);
}

/* OPEN NEW PAGE VIEW (SAME TAB) */
function openCards(){

  let name=document.getElementById("name").value.trim();
  if(!name) return alert("Naam likhein");

  document.getElementById("home").style.display="none";
  document.getElementById("cardsPage").style.display="block";

  let designs=["eid.jpg","eid2.jpg","pink.jpg","masjid.jpg"];

  let html="";

  designs.forEach((bg,i)=>{

    let fontClass="name";
    if(isArabic(name)) fontClass="name arabic";
    else if(isUrdu(name)) fontClass="name urdu";

    html+=`
    <div>
      <div class="card" id="card${i}" style="background-image:url('${bg}')">
        <div class="overlay">
          <img src="logo.png" class="logo">
          <div class="${fontClass}">${name}</div>
        </div>
      </div>

      <div class="actions">
        <button class="download" onclick="downloadCard('card${i}')">Download</button>
        <button class="share" onclick="shareImage('card${i}')">Share</button>
      </div>
    </div>
    `;
  });

  document.getElementById("cardsPage").innerHTML=html;
}

/* DOWNLOAD */
function downloadCard(id){
  let el=document.getElementById(id);

  html2canvas(el,{scale:3,useCORS:true}).then(canvas=>{
    let a=document.createElement("a");
    a.download="eid-card.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
  });
}

/* SHARE */
async function shareImage(id){

  let el=document.getElementById(id);

  let canvas=await html2canvas(el,{scale:3,useCORS:true});

  canvas.toBlob(async(blob)=>{

    let file=new File([blob],"eid.png",{type:"image/png"});

    if(navigator.share && navigator.canShare({files:[file]})){
      await navigator.share({
        title:"Eid Mubarak",
        text:"🌙 Eid Mubarak",
        files:[file]
      });
    }else{
      let a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download="eid.png";
      a.click();
    }

  });

}

</script>

</body>
</html>
