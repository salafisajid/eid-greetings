<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Eid Mubarak | Kulliyatur Raashidatil Islamiyah</title>

  <style>
    body {
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
      background: #0c1a1a;
      color: white;
    }

    input {
      padding: 12px;
      width: 260px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .generate { background: gold; }
    .download { background: green; color: white; }
    .share { background: #25D366; color: white; }

    .card {
      margin: 20px auto;
      padding: 25px;
      width: 320px;
      border-radius: 15px;
      background-size: cover;
      background-position: center;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 15px;
    }

    .logo {
      width: 70px;
      margin-bottom: 10px;
    }

    .urdu {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .inst {
      font-size: 12px;
      margin-top: 10px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<h1>🌙 Eid Mubarak</h1>
<p>KULLIYATUR RAASHIDATIL ISLAMIYAH</p>

<input type="text" id="name" placeholder="Apna naam likhein">
<br>
<button class="generate" onclick="generate()">Generate</button>

<div id="cardsContainer"></div>

<script>

function generate() {
  let name = document.getElementById("name").value;

  if(name === "") {
    alert("Naam likhna zaroori hai");
    return;
  }

  let designs = [
    {
      bg: "https://i.ibb.co/4f3YdK1/mosque.jpg",
      text: `عید مبارک<br>${name}`
    },
    {
      bg: "https://i.ibb.co/0jH0z9H/moon.jpg",
      text: `Eid Mubarak ${name}<br>Allah aapko khush rakhe`
    },
    {
      bg: "https://i.ibb.co/z5Z9b6P/islamic.jpg",
      text: `🌙 Warm Wishes<br>${name}`
    }
  ];

  let output = "";

  designs.forEach((d, i) => {
    output += `
      <div class="card" id="card${i}" style="background-image:url('${d.bg}')">
        <div class="overlay">
          <img src="logo.png" class="logo">

          <div class="urdu">${d.text}</div>

          <div class="inst">KULLIYATUR RAASHIDATIL ISLAMIYAH</div>

          <br>
          <button class="download" onclick="downloadCard('card${i}')">Download</button>
          <button class="share" onclick="shareWhatsApp('${name}')">WhatsApp</button>
        </div>
      </div>
    `;
  });

  document.getElementById("cardsContainer").innerHTML = output;
}

// Download
function downloadCard(id) {
  html2canvas(document.getElementById(id)).then(canvas => {
    let link = document.createElement('a');
    link.download = "eid-card.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

// WhatsApp Share
function shareWhatsApp(name) {
  let text = `🌙 Eid Mubarak from ${name}\nKULLIYATUR RAASHIDATIL ISLAMIYAH`;
  let url = "https://wa.me/?text=" + encodeURIComponent(text);
  window.open(url, "_blank");
}

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
