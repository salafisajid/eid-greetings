<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vertical Eid Generator PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  text-align:center;
  font-family:Segoe UI;
  background:#0c1a1a;
  color:white;
}

input{
  padding:12px;
  width:260px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  padding:10px 18px;
  margin:6px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.generate{
  background:gold;
}

.download{
  background:green;
  color:white;
}

.share{
  background:#25D366;
  color:white;
}

.card{
  width:320px;
  height:560px;
  margin:20px auto;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
}

.name{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:28px;
  font-weight:bold;
  color:#FFD700;
  text-shadow:2px 2px 6px black;
  text-align:center;
  width:90%;
}

.logo{
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
}

.website{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  color:yellow;
}
</style>
</head>

<body>

<h2>🌙 Vertical Eid Generator PRO</h2>

<input id="name" placeholder="Apna naam likhein">
<br>

<button class="generate" onclick="generate()">Generate</button>

<div id="output"></div>

<script>

function generate(){

  let name=document.getElementById("name").value.trim();
  if(!name) return alert("Naam likhein");

  let designs=[
    "blue.jpg",
    "black.jpg",
    "green.jpg",
    "mosque.jpg"
  ];

  let html="";

  designs.forEach((bg,i)=>{

    html+=`
    <div>

      <!-- CARD -->
      <div class="card" id="card${i}" style="background-image:url('${bg}')">

        <div class="overlay">

          <img src="logo.png" class="logo">

          <div class="name">${name}</div>

          <div class="website">www.raashidiyah.com</div>

        </div>

      </div>

      <!-- BUTTONS -->
      <div>
        <button class="download" onclick="downloadCard('card${i}')">
          Download
        </button>

        <button class="share" onclick="shareImage('card${i}')">
          Share
        </button>
      </div>

    </div>`;
  });

  document.getElementById("output").innerHTML=html;
}

/* 📥 DOWNLOAD */
function downloadCard(id){
  html2canvas(document.getElementById(id)).then(canvas=>{
    let a=document.createElement("a");
    a.download="eid-card.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
  });
}

/* 📲 REAL MOBILE SHARE SHEET */
async function shareImage(id){

  let card=document.getElementById(id);

  let canvas = await html2canvas(card);

  canvas.toBlob(async (blob)=>{

    let file = new File([blob], "eid-card.png", { type: "image/png" });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {

      try {
        await navigator.share({
          title: "Eid Mubarak",
          text: "🌙 Eid Mubarak",
          files: [file]
        });
      } catch (e) {
        console.log("Share cancelled");
      }

    } else {

      // fallback download
      let a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "eid-card.png";
      a.click();

      alert("Mobile device par open karein for proper share menu");
    }

  });

}

</script>

</body>
</html>
