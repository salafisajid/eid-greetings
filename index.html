<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eid Generator PRO HD</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">

<style>

/* 🔥 FULL CENTER PAGE */
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;   /* X center */
  align-items:center;       /* Y center */
  flex-direction:column;
  font-family:Segoe UI;
  background:#0c1a1a;
  color:white;
}

/* BIG FIRST SCREEN */
.header{
  text-align:center;
  margin-bottom:20px;
}

h1{
  font-size:42px;   /* 🔥 BIGGER */
  margin-bottom:10px;
}

input{
  width:90%;
  max-width:450px;
  padding:20px;
  font-size:22px;
  border-radius:12px;
  border:none;
  text-align:center;
}

.generate{
  margin-top:15px;
  padding:16px 30px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:gold;
  cursor:pointer;
  font-weight:bold;
}

/* CARD */
.card{
  width:320px;
  height:560px;
  margin:20px auto;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

/* 🔥 NAME (MORE UP NOW) */
.name{
  position:absolute;
  bottom:110px;   /* 🔥 moved UP */
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:bold;
  color:#FFD700;
  text-shadow:2px 2px 6px black;
  text-align:center;
  width:90%;
}

/* ARABIC */
.arabic{
  font-family:'Amiri', serif;
  direction:rtl;
  font-size:30px;
}

/* URDU */
.urdu{
  font-family:'Noto Nastaliq Urdu', serif;
  direction:rtl;
  font-size:28px;
}

/* LOGO */
.logo{
  position:absolute;
  bottom:15px;
  left:15px;
  width:60px;
}

/* BUTTONS */
.actions{
  margin-top:5px;
}

button{
  padding:10px 16px;
  margin:5px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.download{
  background:green;
  color:white;
}

.share{
  background:#25D366;
  color:white;
}

</style>
</head>

<body>

<!-- 🔥 CENTER FIRST SCREEN -->
<div class="header">
  <h1>🌙 Eid Generator PRO</h1>
  <p>Apna naam likhein</p>

  <input id="name" placeholder="Enter your name">

  <br>
  <button class="generate" onclick="generate()">Generate Cards</button>
</div>

<!-- OUTPUT -->
<div id="output"></div>

<script>

/* LANGUAGE DETECTION */
function isArabic(text){
  return /[\u0600-\u06FF]/.test(text);
}

function isUrdu(text){
  return /[\u0600-\u06FF\u0750-\u077F]/.test(text);
}

/* GENERATE */
function generate(){

  let name=document.getElementById("name").value.trim();
  if(!name) return alert("Naam likhein");

  let designs=[
    "eid.jpg",
    "eid2.jpg",
    "pink.jpg"
  ];

  let html="";

  designs.forEach((bg,i)=>{

    let fontClass="name";

    if(isArabic(name)){
      fontClass="name arabic";
    }
    else if(isUrdu(name)){
      fontClass="name urdu";
    }

    html+=`
    <div>

      <div class="card" id="card${i}" style="background-image:url('${bg}')">

        <div class="overlay">

          <img src="logo.png" class="logo">

          <div class="${fontClass}">${name}</div>

        </div>

      </div>

      <div class="actions">

        <button class="download" onclick="downloadCard('card${i}')">
          Download
        </button>

        <button class="share" onclick="shareImage('card${i}')">
          Share
        </button>

      </div>

    </div>
    `;
  });

  document.getElementById("output").innerHTML=html;
}

/* 🔥 HD DOWNLOAD UPGRADED */
function downloadCard(id){

  html2canvas(document.getElementById(id), {
    scale: 4,               // 🔥 SUPER HD
    useCORS: true,
    allowTaint: true,
    backgroundColor: null
  }).then(canvas=>{

    let a=document.createElement("a");
    a.download="eid-card-hd.png";
    a.href=canvas.toDataURL("image/png",1.0);
    a.click();

  });

}

/* SHARE */
async function shareImage(id){

  let card=document.getElementById(id);

  let canvas=await html2canvas(card,{scale:3});

  canvas.toBlob(async(blob)=>{

    let file=new File([blob],"eid.png",{type:"image/png"});

    if(navigator.share && navigator.canShare({files:[file]})){

      await navigator.share({
        title:"Eid Mubarak",
        text:"🌙 Eid Mubarak",
        files:[file]
      });

    }else{

      let a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download="eid.png";
      a.click();

    }

  });

}

</script>

</body>
</html>
