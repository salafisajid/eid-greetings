<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eid Generator PRO HD</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0c1a1a;
  color:white;
  text-align:center;
}

/* ===== HOME SCREEN BIG ===== */
.header{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
}

h1{
  font-size:56px;
  margin-bottom:10px;
}

input{
  width:95%;
  max-width:600px;
  padding:26px;
  font-size:26px;
  border-radius:14px;
  border:none;
  text-align:center;
  margin-top:20px;
}

.generate{
  margin-top:25px;
  padding:18px 45px;
  font-size:22px;
  border:none;
  border-radius:12px;
  background:gold;
  cursor:pointer;
  font-weight:bold;
}

/* MOBILE + WEBSITE BELOW BUTTON */
.info{
  margin-top:25px;
  font-size:16px;
  line-height:1.8;
  opacity:0.9;
}

/* ===== CARD ===== */
.card{
  width:320px;
  height:560px;
  margin:20px auto;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

/* NAME */
.name{
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
  font-weight:bold;
  color:#FFD700;
  text-shadow:2px 2px 6px black;
  width:90%;
}

/* ARABIC */
.arabic{
  font-family:'Amiri', serif;
  direction:rtl;
  font-size:32px;
}

/* URDU */
.urdu{
  font-family:'Noto Nastaliq Urdu', serif;
  direction:rtl;
  font-size:30px;
}

/* LOGO */
.logo{
  position:absolute;
  bottom:15px;
  left:15px;
  width:60px;
}

/* BUTTONS */
.actions{
  margin-bottom:30px;
}

button{
  padding:10px 16px;
  margin:5px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.download{
  background:green;
  color:white;
}

.share{
  background:#25D366;
  color:white;
}
</style>
</head>

<body>

<!-- ===== HOME SCREEN ===== -->
<div class="header">

  <h1>🌙 Eid Mubarak</h1>

  <p style="font-size:20px;">
    KULLIYATUR RASHIDAATIL ISLAMIYAH
  </p>

  <input id="name" placeholder="Apna naam likhein">

  <button class="generate" onclick="generate()">Generate Cards</button>

  <div class="info">
    📞 +91 87791 22931 <br>
    🌐 www.raashidiyah.com
  </div>

</div>

<!-- OUTPUT -->
<div id="output"></div>

<script>

/* LANGUAGE DETECTION */
function isArabic(text){
  return /[\u0600-\u06FF]/.test(text);
}
function isUrdu(text){
  return /[\u0600-\u06FF\u0750-\u077F]/.test(text);
}

/* GENERATE */
function generate(){

  let name=document.getElementById("name").value.trim();
  if(!name) return alert("Naam likhein");

  let designs=["eid.jpg","eid2.jpg","pink.jpg"];

  let html="";

  designs.forEach((bg,i)=>{

    let fontClass="name";
    if(isArabic(name)) fontClass="name arabic";
    else if(isUrdu(name)) fontClass="name urdu";

    html+=`
    <div>
      <div class="card" id="card${i}" style="background-image:url('${bg}')">
        <div class="overlay">
          <img src="logo.png" class="logo">
          <div class="${fontClass}">${name}</div>
        </div>
      </div>

      <div class="actions">
        <button class="download" onclick="downloadCard('card${i}')">Download</button>
        <button class="share" onclick="shareImage('card${i}')">Share</button>
      </div>
    </div>
    `;
  });

  document.getElementById("output").innerHTML=html;
}

/* HD DOWNLOAD */
function downloadCard(id){
  let element=document.getElementById(id);

  html2canvas(element,{
    scale:3,
    useCORS:true,
    allowTaint:true,
    backgroundColor:null
  }).then(canvas=>{
    let a=document.createElement("a");
    a.download="eid-card-hd.png";
    a.href=canvas.toDataURL("image/png",1.0);
    a.click();
  });
}

/* NATIVE SHARE */
async function shareImage(id){
  let card=document.getElementById(id);

  let canvas=await html2canvas(card,{
    scale:3,
    useCORS:true,
    backgroundColor:null
  });

  canvas.toBlob(async (blob)=>{

    let file=new File([blob],"eid.png",{type:"image/png"});

    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({
          title:"Eid Mubarak",
          text:"🌙 Eid Mubarak",
          files:[file]
        });
      }catch(e){}
    }else{
      let a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download="eid.png";
      a.click();
      alert("Share supported nahi hai, image download ho gayi");
    }

  });

}

</script>

</body>
</html>
