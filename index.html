<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eid Greeting PRO MAX FINAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  background:#001f1f;
  color:white;
  text-align:center;
  font-family:Segoe UI;
}

input,button{
  padding:10px;
  margin:5px;
}

/* 📱 MAIN CARD */
.card{
  position:relative;
  width:320px;
  height:560px;
  margin:20px auto;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* DRAG ITEMS */
.item{
  position:absolute;
  cursor:grab;
  user-select:none;
}

/* LOGO */
.logo{
  width:60px;
}

/* NAME */
.name{
  color:#FFD700;
  font-weight:bold;
  text-shadow:2px 2px 6px black;
  max-width:85%;
  text-align:center;
}

/* WEBSITE */
.website{
  position:absolute;
  bottom:10px;
  right:12px;
  font-size:11px;
  color:yellow;
  opacity:0.9;
}
</style>
</head>

<body>

<h2>🌙 Eid Greeting PRO MAX FINAL</h2>

<input id="name" placeholder="Apna naam likhein">
<button onclick="generate()">Generate</button>
<button onclick="downloadCard()">Download PNG</button>

<div id="output"></div>

<script>

let active=null,offsetX=0,offsetY=0;

/* 🧠 FONT AUTO SIZE */
function fontSize(name){
  if(name.length<10) return "28px";
  if(name.length<20) return "24px";
  if(name.length<30) return "20px";
  return "18px";
}

/* 🚀 GENERATE */
function generate(){

  let name=document.getElementById("name").value.trim();
  if(!name) return alert("Naam likhein");

  let designs=["blue.jpg","green.jpg","black.jpg","mosque.jpg"];

  let html="";

  designs.forEach(bg=>{

    html+=`
    <div class="card" style="background-image:url('${bg}')">

      <img src="logo.png"
        class="item logo"
        style="left:15px;bottom:15px;"
        onmousedown="dragStart(event)">

      <div class="item name"
        style="left:50%;top:60%;transform:translateX(-50%);font-size:${fontSize(name)};"
        onmousedown="dragStart(event)">
        ${name}
      </div>

      <div class="website">www.raashidiyah.com</div>

    </div>`;
  });

  document.getElementById("output").innerHTML=html;
}

/* 🖱️ DRAG SYSTEM (SAFE) */
function dragStart(e){
  active=e.target;
  offsetX=e.offsetX;
  offsetY=e.offsetY;
  document.onmousemove=drag;
  document.onmouseup=stop;
}

function drag(e){
  if(!active) return;

  let parent=active.parentElement;
  let rect=parent.getBoundingClientRect();

  let x=e.clientX-rect.left-offsetX;
  let y=e.clientY-rect.top-offsetY;

  /* SAFE BOUNDARY */
  if(x<0) x=0;
  if(y<0) y=0;
  if(x>280) x=280;
  if(y>520) y=520;

  active.style.left=x+"px";
  active.style.top=y+"px";
  active.style.transform="none";
}

function stop(){
  active=null;
  document.onmousemove=null;
}

/* 📸 DOWNLOAD */
function downloadCard(){

  let card=document.querySelector(".card");

  html2canvas(card,{scale:2}).then(canvas=>{
    let a=document.createElement("a");
    a.download="eid-pro.png";
    a.href=canvas.toDataURL();
    a.click();
  });
}

</script>

</body>
</html>
