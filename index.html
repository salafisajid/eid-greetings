<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eid Greeting STABLE PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  background:#001f1f;
  color:white;
  text-align:center;
  font-family:Segoe UI;
}

input,button{
  padding:10px;
  margin:5px;
}

.card{
  position:relative;
  width:320px;
  height:560px;
  margin:20px auto;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* NAME (CENTRAL CONTROLLED SYSTEM) */
.name{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  color:#FFD700;
  font-weight:bold;
  text-shadow:2px 2px 6px black;
  max-width:90%;
  text-align:center;
}

/* SAFE ZONES */
.top{ top:30px; }
.top2{ top:70px; }
.center{ top:50%; transform:translate(-50%,-50%); }
.bottom{ bottom:40px; }

.logo{
  position:absolute;
  width:60px;
  left:15px;
  bottom:15px;
}

.website{
  position:absolute;
  bottom:10px;
  right:12px;
  font-size:11px;
  color:yellow;
  opacity:0.9;
}
</style>
</head>

<body>

<h2>🌙 Eid Greeting STABLE PRO</h2>

<input id="name" placeholder="Apna naam likhein">
<button onclick="generate()">Generate</button>
<button onclick="downloadCard()">Download PNG</button>

<div id="output"></div>

<script>

function getFontSize(name){
  if(name.length < 10) return "28px";
  if(name.length < 20) return "24px";
  if(name.length < 30) return "20px";
  return "18px";
}

function generate(){

  let name=document.getElementById("name").value.trim();
  if(!name) return alert("Naam likhein");

  let size=getFontSize(name);

  let designs=[

    /* 🔵 BLUE (stable top2) */
    {
      bg:"blue.jpg",
      pos:"top2"
    },

    /* 🟢 GREEN (bottom right rule removed, stable center feel) */
    {
      bg:"green.jpg",
      pos:"bottom"
    },

    /* ⚫ BLACK (very top safe) */
    {
      bg:"black.jpg",
      pos:"top"
    },

    /* 🕌 MOSQUE (upper safe zone) */
    {
      bg:"mosque.jpg",
      pos:"top2"
    }

  ];

  let html="";

  designs.forEach(d=>{

    html+=`
    <div class="card" style="background-image:url('${d.bg}')">

      <img src="logo.png" class="logo">

      <div class="name ${d.pos}" style="font-size:${size};">
        ${name}
      </div>

      <div class="website">www.raashidiyah.com</div>

    </div>`;
  });

  document.getElementById("output").innerHTML=html;
}

/* 📸 DOWNLOAD */
function downloadCard(){
  let card=document.querySelector(".card");
  html2canvas(card,{scale:2}).then(canvas=>{
    let a=document.createElement("a");
    a.download="eid-stable.png";
    a.href=canvas.toDataURL();
    a.click();
  });
}

</script>

</body>
</html>
