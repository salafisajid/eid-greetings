<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eid Greeting</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">

<style>
body {
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #001f1f, #003333);
  color: white;
}

input {
  padding: 12px;
  width: 260px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  margin: 8px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.generate { background: gold; }
.download { background: green; color: white; }
.share { background: #25D366; color: white; }

.card {
  position: relative;
  margin: 20px auto;
  width: 500px;
  height: 300px;
  border-radius: 15px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.3);
}

.logo {
  position: absolute;
  top: 25px;
  left: 30px;
  width: 90px;
}

.name {
  position: absolute;
  left: 50px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  font-weight: bold;
  line-height: 1.3;
  text-shadow: 2px 2px 6px black;
}

.arabic {
  font-family: 'Amiri', serif;
  direction: rtl;
  font-size: 36px;
}

.dua {
  position: absolute;
  left: 50px;
  top: calc(50% + 60px);
  transform: translateY(-50%);
  font-family: 'Amiri', serif;
  font-size: 28px;
  color: #b8860b;
}

.website {
  position: absolute;
  bottom: 10px;
  right: 15px;
  font-size: 14px;
  color: yellow;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🌙 Eid Mubarak</h1>
<p>KULLIYATUR RAASHIDATIL ISLAMIYAH</p>

<input type="text" id="name" placeholder="Apna naam likhein">
<br>
<button class="generate" onclick="generate()">Generate</button>

<div id="cardsContainer"></div>

<script>

function isArabic(text) {
  return /[\u0600-\u06FF]/.test(text);
}

/* 🔥 NAME SPLIT FUNCTION */
function formatName(name) {
  let words = name.trim().split(" ");
  let lines = [];

  for (let i = 0; i < words.length; i++) {

    // Abdul / Abdur rule
    if ((words[i].toLowerCase() === "abdul" || words[i].toLowerCase() === "abdur") && i < words.length - 1) {
      lines.push(words[i] + " " + words[i + 1]);
      i++; // skip next word
    } else {
      lines.push(words[i]);
    }
  }

  return lines.join("<br>");
}

function generate() {
  let name = document.getElementById("name").value;

  if(name === "") {
    alert("Naam likhna zaroori hai");
    return;
  }

  let formattedName = formatName(name);

  let designs = [
    { bg: "mosque.jpg", color: "#8B4513", dua: true },
    { bg: "moon.jpg", color: "#FFFFFF", dua: false },
    { bg: "islamic.jpg", color: "#FFD700", dua: true },
    { bg: "islamic2.jpg", color: "#FFD700", dua: true }
  ];

  let isAr = isArabic(name);
  let nameClass = isAr ? "name arabic" : "name";

  let output = "";

  designs.forEach((d) => {

    let duaText = d.dua ? `<div class="dua">تقبل الله منا ومنكم</div>` : "";

    output += `
      <div class="card" style="background-image:url('${d.bg}')">
        <div class="overlay"></div>
        <img src="logo.png" class="logo">
        <div class="${nameClass}" style="color:${d.color}">${formattedName}</div>
        ${duaText}
        <div class="website">www.raashidiyah.com</div>
      </div>

      <button class="download" onclick="downloadHD('${d.bg}','${name}','${d.color}', ${d.dua}, ${isAr})">Download HD</button>
      <button class="share" onclick="shareWhatsApp('${name}')">WhatsApp</button>
      <br>
    `;
  });

  document.getElementById("cardsContainer").innerHTML = output;
}


/* 🔥 HD DOWNLOAD WITH LINE BREAK */
function downloadHD(bg, name, color, hasDua, isAr) {

  let canvas = document.createElement("canvas");
  let ctx = canvas.getContext("2d");

  canvas.width = 1920;
  canvas.height = 1080;

  let img = new Image();
  img.src = bg;

  img.onload = function() {

    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let logo = new Image();
    logo.src = "logo.png";

    logo.onload = function() {
      ctx.drawImage(logo, 80, 80, 200, 200);

      let lines = formatName(name).split("<br>");

      ctx.fillStyle = color;
      ctx.font = isAr ? "bold 80px Amiri" : "bold 70px Arial";
      ctx.textAlign = "left";

      let startY = canvas.height / 2 - (lines.length * 40);

      lines.forEach((line, i) => {
        ctx.fillText(line, 50, startY + (i * 80));
      });

      if (hasDua) {
        ctx.fillStyle = "#b8860b";
        ctx.font = "bold 50px Amiri";
        ctx.fillText("تقبل الله منا ومنكم", 50, startY + (lines.length * 80) + 20);
      }

      ctx.fillStyle = "yellow";
      ctx.font = "bold 28px Arial";
      ctx.textAlign = "right";
      ctx.fillText("www.raashidiyah.com", canvas.width - 40, canvas.height - 20);

      let link = document.createElement("a");
      link.download = "eid-HD.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    };
  };
}

function shareWhatsApp(name) {
  let text = `${name} ki taraf se Eid Mubarak`;
  let url = "https://wa.me/?text=" + encodeURIComponent(text);
  window.open(url, "_blank");
}

</script>

</body>
</html>
