<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eid Greeting</title>

<style>
body {
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #001f1f, #003333);
  color: white;
}

h1 { margin-top: 20px; }

input {
  padding: 12px;
  width: 260px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  margin: 8px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.generate { background: gold; }
.download { background: green; color: white; }
.share { background: #25D366; color: white; }

/* CARD */
.card {
  position: relative;
  margin: 20px auto;
  width: 500px;
  height: 300px;
  border-radius: 15px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.3);
}

/* BIG LOGO */
.logo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 90px;
}

/* NAME */
.name {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 28px;
  font-weight: bold;
}

/* FOOTER TEXT */
.footer {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  color: navy;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🌙 Eid Mubarak</h1>
<p>KULLIYATUR RAASHIDATIL ISLAMIYAH</p>

<input type="text" id="name" placeholder="Apna naam likhein">
<br>
<button class="generate" onclick="generate()">Generate</button>

<div id="cardsContainer"></div>

<script>

function generate() {
  let name = document.getElementById("name").value;

  if(name === "") {
    alert("Naam likhna zaroori hai");
    return;
  }

  let designs = [
    { bg: "mosque.jpg", color: "#8B4513" },
    { bg: "moon.jpg", color: "#FFFFFF" },
    { bg: "islamic.jpg", color: "#FFD700" },
    { bg: "islamic2.jpg", color: "#FFD700" }
  ];

  let output = "";

  designs.forEach((d) => {
    output += `
      <div class="card" style="background-image:url('${d.bg}')">
        <div class="overlay"></div>
        <img src="logo.png" class="logo">
        <div class="name" style="color:${d.color}">${name}</div>
        <div class="footer">www.raashidiyah.com - +918779122931</div>
      </div>

      <button class="download" onclick="downloadHD('${d.bg}','${name}','${d.color}')">Download HD</button>
      <button class="share" onclick="shareWhatsApp('${name}')">WhatsApp</button>
      <br>
    `;
  });

  document.getElementById("cardsContainer").innerHTML = output;
}


/* HD DOWNLOAD */
function downloadHD(bg, name, color) {
  let canvas = document.createElement("canvas");
  let ctx = canvas.getContext("2d");

  canvas.width = 1920;
  canvas.height = 1080;

  let img = new Image();
  img.src = bg;

  img.onload = function() {

    let imgRatio = img.width / img.height;
    let canvasRatio = canvas.width / canvas.height;

    let drawWidth, drawHeight, offsetX, offsetY;

    if (imgRatio > canvasRatio) {
      drawHeight = canvas.height;
      drawWidth = img.width * (canvas.height / img.height);
      offsetX = -(drawWidth - canvas.width) / 2;
      offsetY = 0;
    } else {
      drawWidth = canvas.width;
      drawHeight = img.height * (canvas.width / img.width);
      offsetX = 0;
      offsetY = -(drawHeight - canvas.height) / 2;
    }

    ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);

    // overlay
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // logo BIG
    let logo = new Image();
    logo.src = "logo.png";

    logo.onload = function() {
      ctx.drawImage(logo, 40, 40, 200, 200);

      // name
      ctx.fillStyle = color;
      ctx.font = "bold 70px Arial";
      ctx.fillText(name, 60, canvas.height / 2);

      // footer text
      ctx.fillStyle = "navy";
      ctx.font = "bold 30px Arial";
      ctx.textAlign = "center";
      ctx.fillText("www.raashidiyah.com - +918779122931", canvas.width / 2, canvas.height - 40);

      let link = document.createElement("a");
      link.download = "eid-HD.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    };
  };
}


/* WhatsApp */
function shareWhatsApp(name) {
  let text = `${name} ki taraf se Eid Mubarak`;
  let url = "https://wa.me/?text=" + encodeURIComponent(text);
  window.open(url, "_blank");
}

</script>

</body>
</html>
