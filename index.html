<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vertical Eid Name Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  text-align:center;
  font-family:Segoe UI;
  background:#0c1a1a;
  color:white;
}

input{
  padding:12px;
  width:260px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  padding:10px 18px;
  margin:6px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  background:gold;
}

.card{
  width:320px;
  height:560px;
  margin:20px auto;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
}

/* NAME CENTER */
.name{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:28px;
  font-weight:bold;
  color:#FFD700;
  text-shadow:2px 2px 6px black;
  text-align:center;
  width:90%;
}

/* LOGO TOP */
.logo{
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
}

/* WEBSITE BOTTOM */
.website{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  color:yellow;
  opacity:0.9;
}
</style>
</head>

<body>

<h2>🌙 Vertical Eid Name Generator</h2>

<input id="name" placeholder="Apna naam likhein">
<br>

<button onclick="generate()">Generate</button>

<div id="output"></div>

<script>

function generate(){

  let name=document.getElementById("name").value.trim();
  if(!name) return alert("Naam likhein");

  let designs=[
    "blue.jpg",
    "black.jpg",
    "green.jpg",
    "mosque.jpg"
  ];

  let html="";

  designs.forEach(bg=>{

    html+=`
    <div class="card" style="background-image:url('${bg}')">

      <div class="overlay">

        <img src="logo.png" class="logo">

        <div class="name">${name}</div>

        <div class="website">www.raashidiyah.com</div>

      </div>

    </div>`;
  });

  document.getElementById("output").innerHTML=html;
}

</script>

</body>
</html>
